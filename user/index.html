<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <!-- ── BASIC ── -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── PRIMARY SEO ── -->
    <title>Ghar Ka Organic — Pure Homemade Organic Food Products</title>
    <meta
      name="description"
      content="Ghar Ka Organic delivers authentic homemade organic food products across India. Fresh, chemical-free masalas, spices, and traditional desi foods made with love from home kitchens." />
    <meta
      name="keywords"
      content="ghar ka organic, homemade food, organic products India, pure food, homemade masala, organic spices, desi food, natural products, chemical free food, traditional indian food" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Ghar Ka Organic" />
    <meta name="copyright" content="Ghar Ka Organic" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="7 days" />

    <!-- ── GEO SEO ── -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />
    <meta name="ICBM" content="20.5937, 78.9629" />

    <!-- ── CANONICAL ── -->
    <link rel="canonical" href="https://gharkaorganic.com/" />

    <!-- ── HREFLANG (Multilingual Targeting) ── -->
    <link rel="alternate" hreflang="en-IN" href="https://gharkaorganic.com/" />
    <link rel="alternate" hreflang="hi" href="https://gharkaorganic.com/hi/" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://gharkaorganic.com/" />

    <!-- ── PERFORMANCE ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="dns-prefetch" href="https://www.google-analytics.com" />

      rel="stylesheet" />

    <link rel="icon" type="image/png" sizes="32x32" href="/gharka-logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/gharka-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/gharka-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── THEME ── -->

    <meta name="msapplication-TileImage" content="/gharka-logo.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <meta name="twitter:creator" content="@gharkaorganic" />
    <meta
      name="twitter:title"
      content="Ghar Ka Organic — Pure Homemade Goodness" />

      content="Homemade organic food products, pure, authentic, and chemical-free. Delivered across India." />

      name="twitter:image"
      content="https://gharkaorganic.com/og-cover.png" />

    <!-- ── STRUCTURED DATA: Organization ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Ghar Ka Organic",
        "url": "https://gharkaorganic.com/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://gharkaorganic.com/gharka-logo.png",
          "width": 200,
          "height": 200
        },
        "image": "https://gharkaorganic.com/og-cover.png",
        "description": "Authentic homemade organic food products made with traditional methods. Chemical-free, pure, and delivered across India.",
        "areaServed": {
          "@type": "Country",
          "name": "India"
        },
        "sameAs": [
          "https://www.instagram.com/gharkaorganic",
          "https://www.facebook.com/gharkaorganic"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        }
      }
    </script>

    <!-- ── STRUCTURED DATA: Store / Product Catalog ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Ghar Ka Organic",
        "url": "https://gharkaorganic.com/",
        "description": "Shop pure homemade organic food products — masalas, spices, desi ghee, pickles, and more.",
        "image": "https://gharkaorganic.com/og-cover.png",
        "priceRange": "₹₹",
        "servesCuisine": "Indian",
        "areaServed": "IN",
        "currenciesAccepted": "INR",
        "paymentAccepted": "Cash, UPI, Credit Card, Debit Card",
        "openingHours": "Mo-Su 09:00-18:00"
      }
    </script>

    <!-- ── STRUCTURED DATA: WebSite + Sitelinks Searchbox ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ghar Ka Organic",
        "url": "https://gharkaorganic.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://gharkaorganic.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ── STRUCTURED DATA: BreadcrumbList ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://gharkaorganic.com/"
          }
        ]
      }
    </script>

    <!-- ── PERFORMANCE PRELOAD ── -->
    <link rel="preload" href="/gharka-logo.png" as="image" type="image/png" />
    <link rel="preload" href="/og-cover.png" as="image" type="image/png" />
